name: Validate NixOS configuration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: nixos-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Tests and system build
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: fkz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' || secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Check changed files for whitespace errors
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"

      - name: Check pushed files for whitespace errors
        if: github.event_name == 'push'
        run: git diff --check "${{ github.event.before }}...${{ github.sha }}"

      - name: Run plugin tests
        run: nix shell --inputs-from . nixpkgs#python3Packages.pytest -c pytest -q

      - name: Evaluate flake checks
        run: nix flake check --no-build

      - name: Build complete NixOS system
        run: nix build .#nixosConfigurations.nixos.config.system.build.toplevel --no-link
