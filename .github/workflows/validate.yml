name: Validate NixOS configuration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: nixos-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Tests and system build
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: server-config
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' || secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Check changed files for whitespace errors
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"

      - name: Check pushed files for whitespace errors
        if: github.event_name == 'push'
        run: git diff --check "${{ github.event.before }}...${{ github.sha }}"

      - name: Run plugin tests
        run: nix shell --inputs-from . nixpkgs#python3Packages.pytest -c pytest -q

      - name: Evaluate flake checks
        run: nix flake check --no-build

      - name: Build complete NixOS system when not cached
        run: |
          system_path=$(nix eval --raw \
            .#nixosConfigurations.nixos.config.system.build.toplevel.outPath)

          if nix path-info --store https://server-config.cachix.org \
              "$system_path" >/dev/null 2>&1; then
            echo "System is already present in Cachix; skipping realization."
          else
            nix build \
              .#nixosConfigurations.nixos.config.system.build.toplevel \
              --no-link
          fi

  deploy:
    name: Trigger NixOS update over Tailscale
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Join the tailnet
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: home.taila70923.ts.net

      - name: Trigger the authenticated update receiver
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.NIXOS_DEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "$DEPLOY_WEBHOOK_SECRET" ]; then
            echo "NIXOS_DEPLOY_WEBHOOK_SECRET is not configured" >&2
            exit 1
          fi

          printf '{"ref":"refs/heads/main","deleted":false,"after":"%s"}' \
            "$GITHUB_SHA" > payload.json

          signature=$(python3 - <<'PY'
          import hashlib
          import hmac
          import os

          with open("payload.json", "rb") as payload_file:
              payload = payload_file.read()
          secret = os.environ["DEPLOY_WEBHOOK_SECRET"].encode()
          print(hmac.new(secret, payload, hashlib.sha256).hexdigest())
          PY
          )

          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 --max-time 30 \
            --retry 3 --retry-all-errors \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$signature" \
            --data-binary @payload.json \
            http://home.taila70923.ts.net/webhook/
